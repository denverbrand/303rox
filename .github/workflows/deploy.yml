name: Deploy to SiteGround

# Runs every time you push to main, or manually from the Actions tab.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload changed files to SiteGround
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: ../303rox.com/public_html/
          # Files we DON'T want on the live site
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            LAUNCH-WALKTHROUGH.md
            hyrox-denver-watch.html
            303rox.html
            .gitignore
